<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="format-detection" content="telephone=no">

  <!-- Meta / OG tags - config.js 값으로 script에서 동적 설정 -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="">
  <meta property="og:description" content="">
  <meta property="og:image" content="">
  <meta name="description" content="">

  <title>Wedding Invitation</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@200;300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
  <script src="config.js"></script>
</head>
<body>

  <!-- ═══ Curtain Opening Animation ═══ -->
  <div id="curtain" class="curtain">
    <div class="curtain__left"></div>
    <div class="curtain__right"></div>
    <div class="curtain__content">
      <div class="curtain__leaf-icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c1.5-3 2-6.5 2-10S13.5 5 12 2z"/><path d="M12 2c3 1.5 5 5 5 10s-2 8.5-5 10"/><path d="M2 12h20"/></svg>
      </div>
      <p class="curtain__subtitle">Wedding Invitation</p>
      <p class="curtain__names" id="curtainNames"></p>
      <button class="curtain__btn" id="curtainBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2C6.5 2 2 6.5 2 12c0 3 2.5 6.5 10 10 7.5-3.5 10-7 10-10 0-5.5-4.5-10-10-10z"/><path d="M12 2v20"/></svg>
        초대장 열기
      </button>
    </div>
  </div>

  <!-- ═══ Falling Leaves ═══ -->
  <canvas id="leafCanvas" class="leaf-canvas"></canvas>

  <!-- ═══ Toast Notification ═══ -->
  <div id="toast" class="toast" aria-live="polite"></div>

  <!-- ═══ Photo Viewer Modal ═══ -->
  <div id="photoModal" class="photo-modal" role="dialog" aria-modal="true" aria-label="사진 보기">
    <button class="photo-modal__close" id="modalClose" aria-label="닫기">&times;</button>
    <button class="photo-modal__nav photo-modal__nav--prev" id="modalPrev" aria-label="이전 사진">&#8249;</button>
    <button class="photo-modal__nav photo-modal__nav--next" id="modalNext" aria-label="다음 사진">&#8250;</button>
    <div class="photo-modal__container" id="modalContainer">
      <img class="photo-modal__img" id="modalImg" src="" alt="사진" draggable="false">
    </div>
    <div class="photo-modal__counter" id="modalCounter"></div>
  </div>

  <!-- ═══ Main Content ═══ -->
  <main id="mainContent" class="main-content">

    <!-- ─── Hero Section ─── -->
    <section class="section hero" id="hero">
      <div class="hero__overlay"></div>
      <img class="hero__photo" id="heroPhoto" src="" alt="웨딩 사진" loading="eager">
      <div class="hero__content">
        <p class="hero__label animate-item" data-animate="fade-down">Wedding Invitation</p>
        <h1 class="hero__names animate-item" data-animate="fade-up" id="heroNames"></h1>
        <div class="hero__divider animate-item" data-animate="fade-in">
          <svg width="60" height="20" viewBox="0 0 60 20" fill="none">
            <path d="M5 10 Q15 2 30 10 Q45 18 55 10" stroke="rgba(255,255,255,0.5)" stroke-width="1" fill="none"/>
            <path d="M25 8 C28 3 32 3 35 8 C32 6 28 6 25 8z" fill="rgba(255,255,255,0.4)"/>
          </svg>
        </div>
        <p class="hero__date animate-item" data-animate="fade-up" id="heroDate"></p>
        <p class="hero__venue animate-item" data-animate="fade-up" id="heroVenue"></p>
      </div>

      <!-- Countdown -->
      <div class="countdown animate-item" data-animate="fade-up" id="countdown">
        <p class="countdown__label" id="countdownLabel"></p>
        <div class="countdown__timer">
          <div class="countdown__item">
            <span class="countdown__number" id="countDays">0</span>
            <span class="countdown__unit">일</span>
          </div>
          <div class="countdown__sep">:</div>
          <div class="countdown__item">
            <span class="countdown__number" id="countHours">0</span>
            <span class="countdown__unit">시간</span>
          </div>
          <div class="countdown__sep">:</div>
          <div class="countdown__item">
            <span class="countdown__number" id="countMinutes">0</span>
            <span class="countdown__unit">분</span>
          </div>
          <div class="countdown__sep">:</div>
          <div class="countdown__item">
            <span class="countdown__number" id="countSeconds">0</span>
            <span class="countdown__unit">초</span>
          </div>
        </div>
      </div>
    </section>

    <!-- ─── Leaf Divider ─── -->
    <div class="leaf-divider" aria-hidden="true">
      <svg viewBox="0 0 200 30" preserveAspectRatio="none">
        <path d="M80 15 Q90 5 100 15 Q110 25 120 15" stroke="var(--color-sage)" stroke-width="1" fill="none" opacity="0.5"/>
        <path d="M92 12 C96 6 104 6 108 12 C104 9 96 9 92 12z" fill="var(--color-sage)" opacity="0.3"/>
      </svg>
    </div>

    <!-- ─── Greeting Section ─── -->
    <section class="section greeting" id="greeting">
      <div class="section__inner">
        <div class="botanical-ornament animate-item" data-animate="fade-in" aria-hidden="true">
          <svg width="40" height="50" viewBox="0 0 40 50" fill="none">
            <path d="M20 48 L20 20" stroke="var(--color-sage)" stroke-width="1"/>
            <path d="M20 35 C12 30 8 22 12 15 C16 8 20 12 20 20" stroke="var(--color-sage)" stroke-width="1" fill="var(--color-sage)" fill-opacity="0.15"/>
            <path d="M20 30 C28 25 32 17 28 10 C24 3 20 7 20 15" stroke="var(--color-sage)" stroke-width="1" fill="var(--color-sage)" fill-opacity="0.15"/>
            <path d="M20 25 C14 22 11 16 14 11 C17 6 20 9 20 14" stroke="var(--color-forest)" stroke-width="0.8" fill="var(--color-forest)" fill-opacity="0.1"/>
          </svg>
        </div>
        <h2 class="section__title animate-item" data-animate="fade-up" id="greetingTitle"></h2>
        <p class="greeting__text animate-item" data-animate="fade-up" id="greetingContent"></p>
        <div class="greeting__parents animate-item" data-animate="fade-up" id="greetingParents"></div>
      </div>
    </section>

    <!-- ─── Leaf Divider ─── -->
    <div class="leaf-divider leaf-divider--alt" aria-hidden="true">
      <svg viewBox="0 0 200 20" preserveAspectRatio="none">
        <line x1="40" y1="10" x2="85" y2="10" stroke="var(--color-sage)" stroke-width="0.5" opacity="0.4"/>
        <path d="M90 10 C95 4 105 4 110 10 C105 7 95 7 90 10z" fill="var(--color-sage)" opacity="0.4"/>
        <line x1="115" y1="10" x2="160" y2="10" stroke="var(--color-sage)" stroke-width="0.5" opacity="0.4"/>
      </svg>
    </div>

    <!-- ─── Story Section ─── -->
    <section class="section story" id="story">
      <div class="section__inner">
        <h2 class="section__title animate-item" data-animate="fade-up" id="storyTitle"></h2>
        <p class="story__text animate-item" data-animate="fade-up" id="storyContent"></p>
        <div class="story__photos" id="storyPhotos"></div>
      </div>
    </section>

    <!-- ─── Leaf Divider ─── -->
    <div class="leaf-divider" aria-hidden="true">
      <svg viewBox="0 0 200 30" preserveAspectRatio="none">
        <path d="M80 15 Q90 5 100 15 Q110 25 120 15" stroke="var(--color-sage)" stroke-width="1" fill="none" opacity="0.5"/>
        <path d="M92 12 C96 6 104 6 108 12 C104 9 96 9 92 12z" fill="var(--color-sage)" opacity="0.3"/>
      </svg>
    </div>

    <!-- ─── Gallery Section ─── -->
    <section class="section gallery" id="gallery">
      <div class="section__inner">
        <h2 class="section__title animate-item" data-animate="fade-up">갤러리</h2>
        <div class="gallery__grid" id="galleryGrid"></div>
      </div>
    </section>

    <!-- ─── Leaf Divider ─── -->
    <div class="leaf-divider leaf-divider--alt" aria-hidden="true">
      <svg viewBox="0 0 200 20" preserveAspectRatio="none">
        <line x1="40" y1="10" x2="85" y2="10" stroke="var(--color-sage)" stroke-width="0.5" opacity="0.4"/>
        <path d="M90 10 C95 4 105 4 110 10 C105 7 95 7 90 10z" fill="var(--color-sage)" opacity="0.4"/>
        <line x1="115" y1="10" x2="160" y2="10" stroke="var(--color-sage)" stroke-width="0.5" opacity="0.4"/>
      </svg>
    </div>

    <!-- ─── Location Section ─── -->
    <section class="section location" id="location">
      <div class="section__inner">
        <h2 class="section__title animate-item" data-animate="fade-up">오시는 길</h2>
        <div class="location__info animate-item" data-animate="fade-up">
          <p class="location__venue" id="locationVenue"></p>
          <p class="location__hall" id="locationHall"></p>
          <p class="location__address" id="locationAddress"></p>
          <p class="location__tel" id="locationTel"></p>
        </div>
        <button class="btn btn--text location__copy animate-item" data-animate="fade-up" id="copyAddressBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          주소 복사
        </button>
        <div class="location__map animate-item" data-animate="scale-in">
          <img class="location__map-img" id="locationMapImg" src="" alt="약도" loading="lazy">
        </div>
        <div class="location__links animate-item" data-animate="fade-up">
          <a class="btn btn--kakao" id="kakaoMapBtn" href="#" target="_blank" rel="noopener">카카오맵</a>
          <a class="btn btn--naver" id="naverMapBtn" href="#" target="_blank" rel="noopener">네이버지도</a>
        </div>

        <!-- Calendar -->
        <div class="calendar-inline animate-item" data-animate="scale-in">
          <div class="calendar" id="calendarGrid"></div>
          <div class="calendar-actions">
            <a class="btn btn--outline" id="googleCalBtn" href="#" target="_blank" rel="noopener">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01"/></svg>
              Google 캘린더
            </a>
            <button class="btn btn--outline" id="icsDownloadBtn">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/><path d="M12 14v4M10 16l2 2 2-2"/></svg>
              Apple 캘린더
            </button>
          </div>
        </div>
      </div>
    </section>

    <!-- ─── Leaf Divider ─── -->
    <div class="leaf-divider" aria-hidden="true">
      <svg viewBox="0 0 200 30" preserveAspectRatio="none">
        <path d="M80 15 Q90 5 100 15 Q110 25 120 15" stroke="var(--color-sage)" stroke-width="1" fill="none" opacity="0.5"/>
        <path d="M92 12 C96 6 104 6 108 12 C104 9 96 9 92 12z" fill="var(--color-sage)" opacity="0.3"/>
      </svg>
    </div>

    <!-- ─── Account Section (축의금) ─── -->
    <section class="section account" id="account">
      <div class="section__inner">
        <div class="botanical-ornament animate-item" data-animate="fade-in" aria-hidden="true">
          <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
            <path d="M15 28 C8 22 3 15 8 8 C13 1 15 8 15 15" stroke="var(--color-sage)" stroke-width="1" fill="var(--color-sage)" fill-opacity="0.15"/>
            <path d="M15 28 C22 22 27 15 22 8 C17 1 15 8 15 15" stroke="var(--color-sage)" stroke-width="1" fill="var(--color-sage)" fill-opacity="0.15"/>
          </svg>
        </div>
        <h2 class="section__title animate-item" data-animate="fade-up">마음 전하실 곳</h2>
        <p class="account__desc animate-item" data-animate="fade-up">축하의 마음을 담아 축의금을 전달해 보세요.</p>

        <!-- Groom Accounts -->
        <div class="accordion animate-item" data-animate="fade-up">
          <button class="accordion__trigger" id="groomAccordion" aria-expanded="false">
            <span class="accordion__icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2C6.5 2 2 6.5 2 12c0 3 2.5 6.5 10 10 7.5-3.5 10-7 10-10 0-5.5-4.5-10-10-10z"/><path d="M12 2v20"/></svg>
            </span>
            <span>신랑측 계좌번호</span>
            <svg class="accordion__arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="accordion__panel" id="groomAccordionPanel">
            <div class="accordion__panel-inner" id="groomAccountList"></div>
          </div>
        </div>

        <!-- Bride Accounts -->
        <div class="accordion animate-item" data-animate="fade-up">
          <button class="accordion__trigger" id="brideAccordion" aria-expanded="false">
            <span class="accordion__icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2C6.5 2 2 6.5 2 12c0 3 2.5 6.5 10 10 7.5-3.5 10-7 10-10 0-5.5-4.5-10-10-10z"/><path d="M12 2v20"/></svg>
            </span>
            <span>신부측 계좌번호</span>
            <svg class="accordion__arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="accordion__panel" id="brideAccordionPanel">
            <div class="accordion__panel-inner" id="brideAccountList"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- ─── Footer ─── -->
    <footer class="footer">
      <div class="footer__leaf" aria-hidden="true">
        <svg width="20" height="24" viewBox="0 0 20 24" fill="none">
          <path d="M10 22 C4 17 1 11 5 5 C9 -1 10 5 10 10" stroke="var(--color-sage)" stroke-width="0.8" fill="var(--color-sage)" fill-opacity="0.15"/>
          <path d="M10 22 C16 17 19 11 15 5 C11 -1 10 5 10 10" stroke="var(--color-sage)" stroke-width="0.8" fill="var(--color-sage)" fill-opacity="0.15"/>
        </svg>
      </div>
      <p class="footer__text" id="footerText"></p>
    </footer>

  </main>

  <script src="script.js"></script>
</body>
</html>
